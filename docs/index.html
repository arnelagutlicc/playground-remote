<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test History Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f6f8fa;
      color: #24292f;
      font-size: 14px;
      line-height: 1.5;
    }

    a { color: #0969da; text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      background: #24292f;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: baseline;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header .repo { font-size: 13px; color: #8b949e; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    .summary-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      font-size: 13px;
      color: #57606a;
    }

    button#refresh-btn {
      padding: 4px 12px;
      font-size: 13px;
      font-family: inherit;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      background: #f6f8fa;
      cursor: pointer;
      color: #24292f;
    }
    button#refresh-btn:hover { background: #eaeef2; }
    button#refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .card-header {
      padding: 12px 16px;
      border-bottom: 1px solid #d0d7de;
      font-weight: 600;
      font-size: 14px;
      background: #f6f8fa;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 8px 16px;
      font-weight: 600;
      font-size: 12px;
      color: #57606a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #d0d7de;
      background: #f6f8fa;
    }
    td {
      padding: 10px 16px;
      border-bottom: 1px solid #eaeef2;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }

    /* Run summary rows */
    .run-row { cursor: pointer; }
    .run-row:hover td { background: #f6f8fa; }
    .run-row.expanded td { background: #f0f3f6; }

    .chevron {
      display: inline-block;
      font-style: normal;
      font-size: 10px;
      color: #57606a;
      margin-right: 6px;
      transition: transform 0.15s ease;
      user-select: none;
    }
    .chevron.open { transform: rotate(90deg); }

    .run-num { font-weight: 600; color: #57606a; font-size: 12px; white-space: nowrap; }
    .commit-msg {
      color: #57606a;
      font-size: 12px;
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
      vertical-align: middle;
    }

    /* Detail / sub-table rows */
    .detail-row td { padding: 0; background: #fafbfc; }
    .detail-inner {
      padding: 12px 16px 12px 36px;
      border-top: 1px solid #d0d7de;
    }

    .sub-table { font-size: 13px; }
    .sub-table th {
      font-size: 11px;
      padding: 6px 12px;
      background: #f0f3f5;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .sub-table td {
      padding: 7px 12px;
      border-bottom: 1px solid #eaeef2;
      vertical-align: top;
    }
    .sub-table tr:last-child td { border-bottom: none; }

    .error-text {
      color: #cf222e;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      max-width: 340px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      display: block;
    }
    .error-text.expanded { white-space: pre-wrap; overflow: visible; }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .badge-pass    { background: #dafbe1; color: #1a7f37; }
    .badge-fail    { background: #ffebe9; color: #cf222e; }
    .badge-amber   { background: #fff8c5; color: #9a6700; }
    .badge-blue    { background: #ddf4ff; color: #0550ae; }
    .badge-grey    { background: #eaeef2; color: #57606a; }

    .empty-state { padding: 24px 16px; color: #57606a; font-size: 13px; }
    .error-state { padding: 24px 16px; color: #cf222e; font-size: 13px; }
    .loading-msg  { padding: 12px 16px; color: #57606a; font-size: 13px; font-style: italic; }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #8b949e;
    }
  </style>
</head>
<body>

<header>
  <h1>Test History Dashboard</h1>
  <span class="repo">arnelagutlicc/playground-remote</span>
</header>

<div class="container">

  <div class="summary-bar">
    <span id="summary-text">Loading…</span>
    <button id="refresh-btn" onclick="loadRuns(true)">Refresh</button>
  </div>

  <div class="card">
    <div class="card-header">Run History</div>
    <div id="runs-container"><div class="empty-state">Loading…</div></div>
  </div>

  <div class="card">
    <div class="card-header">Planned Tests</div>
    <div id="planned-container"><div class="empty-state">Loading…</div></div>
  </div>

</div>

<footer>
  <a href="https://github.com/arnelagutlicc/playground-remote" target="_blank">arnelagutlicc/playground-remote</a>
  &nbsp;·&nbsp; Page loaded <span id="page-load-time"></span>
</footer>

<script>
  const REPO      = 'arnelagutlicc/playground-remote';
  const CACHE_KEY = 'gh_runs_cache';
  const CACHE_TTL = 5 * 60 * 1000;

  document.getElementById('page-load-time').textContent = new Date().toLocaleTimeString();

  // In-memory cache for per-run JSON files (avoids re-fetching on re-expand)
  // Values: undefined = not fetched yet, false = fetch failed / 404, object = loaded data
  const runDataCache = new Map();

  // ── Escape ────────────────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Date format ───────────────────────────────────────────────────────────
  function fmt(iso) {
    return new Date(iso).toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  // ── Badges ────────────────────────────────────────────────────────────────
  function badgeForConclusion(conclusion) {
    if (!conclusion)                              return '<span class="badge badge-blue">RUNNING</span>';
    if (conclusion === 'success')                 return '<span class="badge badge-pass">PASS</span>';
    if (conclusion === 'failure')                 return '<span class="badge badge-fail">FAIL</span>';
    if (['cancelled','timed_out'].includes(conclusion))
      return `<span class="badge badge-amber">${conclusion.toUpperCase().replace('_',' ')}</span>`;
    return `<span class="badge badge-grey">${conclusion.toUpperCase()}</span>`;
  }

  function badgeForSummary(summary) {
    if (!summary) return null;
    return summary.failed > 0
      ? '<span class="badge badge-fail">FAIL</span>'
      : '<span class="badge badge-pass">PASS</span>';
  }

  function badgeForTestStatus(status) {
    switch (status) {
      case 'passed':      return '<span class="badge badge-pass">PASS</span>';
      case 'failed':      return '<span class="badge badge-fail">FAIL</span>';
      case 'timedOut':    return '<span class="badge badge-fail">TIMEOUT</span>';
      case 'skipped':     return '<span class="badge badge-amber">SKIPPED</span>';
      case 'fixme':       return '<span class="badge badge-grey">FIXME</span>';
      case 'interrupted': return '<span class="badge badge-amber">INTERRUPTED</span>';
      default:            return `<span class="badge badge-grey">${esc(status)}</span>`;
    }
  }

  // ── sessionStorage cache for runs list ────────────────────────────────────
  function readCache() {
    try {
      const raw = sessionStorage.getItem(CACHE_KEY);
      if (!raw) return null;
      const { data, ts } = JSON.parse(raw);
      if (Date.now() - ts < CACHE_TTL) return { data, ts };
    } catch (_) {}
    return null;
  }

  function writeCache(data) {
    const ts = Date.now();
    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ data, ts }));
    return ts;
  }

  // ── Per-run JSON fetch ────────────────────────────────────────────────────
  async function fetchRunData(runId) {
    if (runDataCache.has(runId)) return runDataCache.get(runId);
    try {
      const res = await fetch(`./data/runs/${runId}.json`);
      if (!res.ok) { runDataCache.set(runId, false); return false; }
      const data = await res.json();
      runDataCache.set(runId, data);
      return data;
    } catch (_) {
      runDataCache.set(runId, false);
      return false;
    }
  }

  // ── Sub-table for per-test results ────────────────────────────────────────
  function renderSubTable(data) {
    if (data === false) {
      return '<p style="color:#57606a;font-size:13px;">No per-test data available for this run.</p>';
    }
    const rows = data.tests.map(t => {
      const errorHtml = t.error
        ? `<span class="error-text" onclick="this.classList.toggle('expanded')" title="${esc(t.error)}">${esc(t.error)}</span>`
        : '—';
      return `<tr>
        <td>${esc(t.title)}</td>
        <td>${esc(t.suite)}</td>
        <td>${esc(t.project)}</td>
        <td>${badgeForTestStatus(t.status)}</td>
        <td style="white-space:nowrap">${esc(t.duration)}</td>
        <td>${errorHtml}</td>
      </tr>`;
    }).join('');

    const { passed = 0, failed = 0, skipped = 0, fixme = 0 } = data.summary ?? {};
    const summaryParts = [
      passed  ? `<span class="badge badge-pass">${passed} passed</span>`   : '',
      failed  ? `<span class="badge badge-fail">${failed} failed</span>`   : '',
      skipped ? `<span class="badge badge-amber">${skipped} skipped</span>` : '',
      fixme   ? `<span class="badge badge-grey">${fixme} fixme</span>`     : '',
    ].filter(Boolean).join(' ');

    return `
      <div style="margin-bottom:8px;display:flex;gap:6px;flex-wrap:wrap;">${summaryParts}</div>
      <table class="sub-table">
        <thead><tr>
          <th>Test</th><th>Suite</th><th>Browser</th><th>Status</th><th>Duration</th><th>Error</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Row expand / collapse ─────────────────────────────────────────────────
  async function toggleRow(runId, detailRowId, chevronId) {
    const detailRow = document.getElementById(detailRowId);
    const chevron   = document.getElementById(chevronId);
    const runRow    = detailRow.previousElementSibling;
    const isOpen    = detailRow.style.display !== 'none';

    if (isOpen) {
      detailRow.style.display = 'none';
      chevron.classList.remove('open');
      runRow.classList.remove('expanded');
      return;
    }

    detailRow.style.display = '';
    chevron.classList.add('open');
    runRow.classList.add('expanded');

    if (!runDataCache.has(runId)) {
      detailRow.querySelector('td').innerHTML =
        '<div class="detail-inner"><p class="loading-msg">Loading tests…</p></div>';
    }

    const data = await fetchRunData(runId);
    detailRow.querySelector('td').innerHTML =
      `<div class="detail-inner">${renderSubTable(data)}</div>`;
  }

  // ── Runs table ────────────────────────────────────────────────────────────
  function renderRuns(runs) {
    if (!runs.length) {
      document.getElementById('runs-container').innerHTML =
        '<div class="empty-state">No runs found.</div>';
      return;
    }

    const rows = runs.map(r => {
      const commit    = (r.head_commit?.message || '').split('\n')[0].slice(0, 60);
      const date      = fmt(r.created_at);
      const runId     = String(r.id);
      const detailId  = `detail-${runId}`;
      const chevronId = `chev-${runId}`;
      const cached    = runDataCache.get(runId);
      const badge     = (cached ? badgeForSummary(cached.summary) : null) ?? badgeForConclusion(r.conclusion);

      return `
        <tr class="run-row" onclick="toggleRow('${runId}','${detailId}','${chevronId}')">
          <td class="run-num"><i class="chevron" id="${chevronId}">&#9654;</i>#${r.run_number}</td>
          <td>${esc(r.name)}</td>
          <td>${esc(r.head_branch)}</td>
          <td style="white-space:nowrap">${date}</td>
          <td>
            <a class="commit-msg" href="${esc(r.html_url)}" title="${esc(commit)}"
               onclick="event.stopPropagation()" target="_blank">${esc(commit)}</a>
          </td>
          <td>${badge}</td>
        </tr>
        <tr class="detail-row" id="${detailId}" style="display:none;">
          <td colspan="6"></td>
        </tr>`;
    }).join('');

    document.getElementById('runs-container').innerHTML = `
      <table>
        <thead><tr>
          <th>Run</th><th>Workflow</th><th>Branch</th><th>Date</th><th>Commit</th><th>Result</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Planned tests table ───────────────────────────────────────────────────
  function renderPlanned(items) {
    if (!items.length) {
      document.getElementById('planned-container').innerHTML =
        '<div class="empty-state">No planned tests defined.</div>';
      return;
    }
    const rows = items.map(p => `
      <tr>
        <td><strong>${esc(p.name)}</strong></td>
        <td>${esc(p.description)}</td>
        <td style="white-space:nowrap">${esc(p.addedDate)}</td>
      </tr>`).join('');

    document.getElementById('planned-container').innerHTML = `
      <table>
        <thead><tr><th>Name</th><th>Description</th><th>Added</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  // ── Main loaders ──────────────────────────────────────────────────────────
  async function loadRuns(forceRefresh = false) {
    const btn = document.getElementById('refresh-btn');
    btn.disabled = true;

    try {
      let data, ts, fromCache = false;

      if (!forceRefresh) {
        const cached = readCache();
        if (cached) { ({ data, ts } = cached); fromCache = true; }
      }

      if (!fromCache) {
        const res = await fetch(
          `https://api.github.com/repos/${REPO}/actions/runs?per_page=50`,
          { headers: { Accept: 'application/vnd.github+json' } }
        );
        if (!res.ok) {
          const msg = res.status === 403
            ? 'Rate limit reached or access denied. If this is a private repository, authentication is required.'
            : `GitHub API returned HTTP ${res.status}.`;
          document.getElementById('runs-container').innerHTML =
            `<div class="error-state">Could not load run history. ${msg}</div>`;
          document.getElementById('summary-text').textContent = 'Error loading data.';
          return;
        }
        data = await res.json();
        ts   = writeCache(data);
      }

      const runs = data.workflow_runs ?? [];
      renderRuns(runs);

      const fetchedAt = new Date(ts).toLocaleTimeString();
      document.getElementById('summary-text').textContent =
        `${runs.length} run${runs.length !== 1 ? 's' : ''} · last fetched ${fetchedAt}${fromCache ? ' (cached)' : ''}`;

    } catch (err) {
      document.getElementById('runs-container').innerHTML =
        `<div class="error-state">Failed to load run history: ${esc(err.message)}</div>`;
      document.getElementById('summary-text').textContent = 'Error loading data.';
    } finally {
      btn.disabled = false;
    }
  }

  async function loadPlanned() {
    try {
      const res = await fetch('./planned-tests.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      renderPlanned(await res.json());
    } catch (_) {
      document.getElementById('planned-container').innerHTML =
        '<div class="empty-state">No planned tests defined.</div>';
    }
  }

  loadRuns();
  loadPlanned();
</script>

</body>
</html>
